# VNE Development Roles — роли разработки (НЕ R1–R8 pipeline)
# Эти роли используются Framework для управления задачами и quality gates.
# R1–R8 — это нарративные роли создания персонажа, они живут внутри VNE.

vne_canon_guard:
  purpose: "Синхронизирует источники истины VNE, помечает stale-документы, поддерживает canon hierarchy."
  can_write_docs: true
  can_write_code: false
  can_deploy: false
  can_review: true
  allowed_paths:
    - AGENTS.md
    - SYSTEM.md
    - README.md
    - docs/
    - knowledge_base/
  approval_required_paths:
    - core/
    - schemas/
  forbidden_paths:
    - personas/
    - scenarios/
    - novel/
    - tools/

vne_retrospector_dev:
  purpose: "Разрабатывает Session Retrospector, normalizer, golden tests и отчёты аудита завершённых сессий."
  can_write_code: true
  can_write_docs: true
  can_review: true
  allowed_paths:
    - scripts/python/session_retrospector.py
    - scripts/python/session_normalizer.py
    - knowledge_base/session_retrospector/
    - tests/golden/
    - docs/
  approval_required_paths:
    - schemas/
  forbidden_paths:
    - core/
    - personas/
    - scenarios/

vne_renpy_adapter:
  purpose: "Готовит Ren'Py MVP, ручной перенос сцен и будущий VNE-to-RenPy mapping layer."
  can_write_code: true
  can_write_docs: true
  allowed_paths:
    - novel/
    - tools/vne_to_renpy/
    - scenarios/
    - personas/
    - docs/
  approval_required_paths:
    - core/
    - schemas/
  forbidden_paths:
    - .github/
    - voyage_framework/

vne_qa:
  purpose: "Аудит persona-модулей, сценариев и runtime-совместимости."
  can_review: true
  can_run_tests: true
  allowed_paths:
    - personas/
    - scenarios/
    - scripts/python/
    - tests/
    - schemas/
  forbidden_paths:
    - novel/
    - tools/

vne_schema_engineer:
  purpose: "Поддерживает JSON Schema, baseline-таблицы и валидацию."
  can_write_code: true
  can_write_docs: true
  can_review: true
  allowed_paths:
    - schemas/
    - core/
    - scripts/python/
  forbidden_paths:
    - personas/
    - novel/

vne_persona_gateway_dev:
  purpose: "Develops the physically read-only Persona Gateway domain core and separately authorized adapters."
  can_write_code: true
  can_write_docs: true
  can_review: false
  allowed_paths:
    - services/persona_gateway/
    - tests/persona_gateway/
    - docs/persona_gateway/
  forbidden_paths:
    - novel/
    - scenarios/
    - .voyage/
    - roles/
    - generated/
    - .github/
    - voyage_framework/

vne_persona_gateway_qa:
  purpose: "Independent read-only security, canon, and implementation audit for Persona Gateway."
  can_review: true
  can_run_tests: true
  allowed_paths:
    - services/persona_gateway/
    - tests/persona_gateway/
    - docs/persona_gateway/
    - personas/
    - core/
    - schemas/
    - tools/aside_memory_store.py
    - tools/aside_context_builder.py
    - scripts/python/build_prompt_modular.py
    - docs/narrative/N7_PERSONA_DATA_GATEWAY_PREFLIGHT_v1.md
    - docs/narrative/N6_CHARACTER_ASIDE_CONTRACT.md
  forbidden_paths:
    - novel/
    - scenarios/
    - .voyage/
    - roles/
    - generated/
